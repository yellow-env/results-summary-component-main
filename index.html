<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, max-scale=1.0, user-scalable=no"
    />
    <!-- displays site properly based on user's device -->

    <link
      rel="shortcut icon"
      href="./assets/images/favicon-32x32.ico"
      type="image/x-icon"
    />

    <title>Frontend Mentor | Results summary component</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="y-container">
        <div class="y-card-container">
          <div class="y-card-l">
            <h3>Your Result</h3>
            <div class="y-result">
              <h2>76</h2>
              <a href="#">of 100</a>
            </div>
            <h2>Great</h2>
            <p class="y-desc">
              You scored higher than 65% of the people who have taken these
              tests.
            </p>
          </div>

          <div class="y-card-r">
            <h2>Summary</h2>

            <div class="y-item-list">
              <div class="y-item reaction">
                <div class="y-info">
                  <img
                    src="./assets/images/icon-reaction.svg"
                    alt="icon"
                    class="y-icon"
                  /><a href="#" class="y-item-name">Reaction</a>
                </div>

                <div class="y-score-value">
                  <p class="y-score">80</p>
                  <span class="y-max-score">/ 100</span>
                </div>
              </div>

              <div class="y-item memory">
                <div class="y-info">
                  <img
                    src="./assets/images/icon-memory.svg"
                    alt="icon"
                    class="y-icon"
                  /><a href="#" class="y-item-name">Memory</a>
                </div>
                <div class="y-score-value">
                  <p class="y-score">92</p>
                  <span class="y-max-score">/ 100</span>
                </div>
              </div>

              <div class="y-item verbal">
                <div class="y-info">
                  <img
                    src="./assets/images/icon-verbal.svg"
                    alt="icon"
                    class="y-icon"
                  /><a href="#" class="y-item-name">Verbal</a>
                </div>
                <div class="y-score-value">
                  <p class="y-score">61</p>
                  <span class="y-max-score">/ 100</span>
                </div>
              </div>

              <div class="y-item visual">
                <div class="y-info">
                  <img
                    src="./assets/images/icon-visual.svg"
                    alt="icon"
                    class="y-icon"
                  /><a href="#" class="y-item-name">Visual</a>
                </div>
                <div class="y-score-value">
                  <p class="y-score">72</p>
                  <span class="y-max-score">/ 100</span>
                </div>
              </div>
            </div>

            <div class="y-container-btn">
              <a href="#" class="y-continue-btn">Continue</a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a href="https://www.frontendmentor.io/profile/yellow-env">Yellow.env</a
        >.
      </div>
    </footer>
  </body>
</html>
